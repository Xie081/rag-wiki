spring:
  application:
    name: personal-project-web2026

  # Default profile
  profiles:
    active: local

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway (enabled by default, uses same datasource)
  flyway:
    enabled: true
    locations: classpath:db/migration

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Devtools
  devtools:
    restart:
      enabled: true

# Server
server:
  port: 8080

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# App custom config
app:
  jwt:
    secret: ${JWT_SECRET:default-jwt-secret-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24 hours
  upload:
    dir: ${UPLOAD_DIR:./uploads}
